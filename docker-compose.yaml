version: "3.9"

services:
  solr:
    image: solr:9.10.1
    container_name: sc4021_solr
    ports:
      - "8983:8983"
    volumes:
      - ./solr/configsets/political_opinions:/opt/solr/server/solr/configsets/political_opinions:ro
      - solr_data:/var/solr
    command:
      - solr-precreate
      - political_opinions
      - /opt/solr/server/solr/configsets/political_opinions

volumes:
  solr_data: